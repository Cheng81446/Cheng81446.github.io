<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    body { font-family: -apple-system, "Noto Serif SC", "Microsoft YaHei", serif; background:#f7f2eb; color:#3d2c1e; padding:24px; }
    .wrap { max-width:820px; margin:0 auto; background:#fff; padding:32px; border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,0.06); }
    header h1{margin:0 0 6px}
    .meta{color:#8b7355;font-size:0.9em}
    .post-list li{ margin-bottom:18px }
    .post-list a{ font-weight:600; color:#3d2c1e; text-decoration:none }
    .post-body{ line-height:1.9; color:#4d3a2a }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>{{ site.title }}</h1>
      <p class="meta">{{ site.description }}</p>
      <hr>
    </header>

    <main class="post-body">
      {{ content }}
    </main>

    <footer style="margin-top:28px;color:#b8a692;font-size:0.9em">
      © {{ site.title }} · {{ site.url | replace: 'https://','' }}
    </footer>
  </div>
</body>
</html>
